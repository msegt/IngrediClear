<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#0f172a"/>

  <!-- Magnifying glass circle -->
  <circle cx="440" cy="420" r="220" fill="none" stroke="#e2e8f0" stroke-width="60" stroke-linecap="round"/>

  <!-- Handle -->
  <line x1="610" y1="590" x2="760" y2="760" stroke="#e2e8f0" stroke-width="68" stroke-linecap="round"/>

  <!-- Leaf body inside lens -->
  <path d="M 340 480 Q 340 300 520 300 Q 520 480 340 480 Z" fill="#10b981"/>
  <path d="M 340 480 Q 520 480 520 300 Q 440 390 340 480 Z" fill="#059669"/>

  <!-- Leaf vein -->
  <path d="M 340 480 Q 430 390 520 300" fill="none" stroke="#d1fae5" stroke-width="10" stroke-linecap="round"/>

  <!-- Leaf glow -->
  <circle cx="430" cy="390" r="80" fill="#10b981" opacity="0.18"/>
</svg>
